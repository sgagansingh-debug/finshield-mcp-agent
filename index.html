<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinShield Concierge Panel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #202124;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #1a73e8;
            margin-top: 0;
            font-size: 28px;
        }

        p {
            color: #5f6368;
        }

        .config-bar {
            margin-bottom: 15px;
            background: #e8f0fe;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: #1a73e8;
            font-size: 14px;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #dadce0;
            background-color: #fff;
            font-size: 14px;
            color: #3c4043;
            cursor: pointer;
            outline: none;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1557b0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .panel {
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 15px;
            background: #f8f9fa;
        }

        .panel h3 {
            margin-top: 0;
            color: #3c4043;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 8px;
        }

        .log-entry {
            font-family: monospace;
            font-size: 13px;
            margin: 6px 0;
            word-break: break-all;
        }

        .secure {
            color: #137333;
            font-weight: bold;
        }

        .danger {
            color: #c5221f;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dadce0;
            font-size: 14px;
        }

        th {
            background-color: #e8f0fe;
            color: #1a73e8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🛡️ Live FinShield Concierge</h1>
        <p>Secure Personal Expense & Subscription Audit Interface. Connected live to your running Python engine.</p>

        <div class="config-bar">
            <label for="modelSelect">🤖 Orchestration Engine Node Base Model:</label>
            <select id="modelSelect">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Default High-Throughput Speed Node)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro (Deep Analytic Compute Node)</option>
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (Legacy Core Compounding Pass)</option>
            </select>
        </div>

        <textarea id="rawInput"
            placeholder="Paste your raw bank statement or billing email text here... (e.g., Hit my visa 4111-2222-3333-4444 for $20.00 at ChatGPT and another charge for netflix)"></textarea>
        <button onclick="sendLiveAuditRequest()">🔒 Run Live Pipeline Loop</button>

        <div class="grid">
            <div class="panel">
                <h3>🔒 Real-Time Harness Telemetry</h3>
                <div id="telemetryLogs">
                    <p style="color: #70757a; font-style: italic;">Awaiting network handshake data...</p>
                </div>
            </div>

            <div class="panel">
                <h3>📊 Dynamic Audit Results</h3>
                <div id="reportOutput">
                    <p style="color: #70757a; font-style: italic;">Awaiting active data processing pass...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function sendLiveAuditRequest() {
            const textData = document.getElementById('rawInput').value;
            const modelValue = document.getElementById('modelSelect').value;

            if (!textData.trim()) return alert("Input text strings required.");

            const telemetryDiv = document.getElementById('telemetryLogs');
            const reportDiv = document.getElementById('reportOutput');

            telemetryDiv.innerHTML = "<div class='log-entry secure'>📡 Dispatching asynchronous API fetch block...</div>";
            reportDiv.innerHTML = "<p style='color: #70757a; font-style: italic;'>Processing data stream...</p>";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        statement_text: textData,
                        selected_model: modelValue // Send dropdown selection parameter directly inside JSON
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.detail || `Server error (Status ${response.status})`;
                    throw new Error(errMsg);
                }

                const data = await response.json();

                telemetryDiv.innerHTML = `
                    <div class="log-entry secure">🔒 Connection Handshake Successful...</div>
                    <div class="log-entry">${data.pii_scrubbed ? '⚠️ <span class="danger">PII Token Intercepted!</span> Running local boundary sanitization...' : '✅ Baseline input validation clean.'}</div>
                    <div class="log-entry" style="color:#5f6368;"><b>Masked Payload Data:</b> "${data.sanitized_payload}"</div>
                    <div class="log-entry secure">⚙️ Active Run Architecture Model: <span style="color:#1a73e8;">${data.orchestrated_by}</span></div>
                    <div class="log-entry secure">🌐 MCP Protocol Layer: <span style="color:#137333;">FastMCP Stdio/HTTP Server Mounted & Handled!</span></div>
                    <div class="log-entry secure">🤖 ADK multi-agent completed token extraction pass.</div>
                `;

                let rows = "";
                if (!data.audit_results || data.audit_results.length === 0) {
                    rows = "<tr><td colspan='3' style='text-align:center;color:#70757a;'>No platform markers detected in input text.</td></tr>";
                } else {
                    data.audit_results.forEach(item => {
                        const statusText = item.status || "Verified Match via Autonomous Open Registry Integration Pass";
                        rows += `<tr><td><b>${item.platform}</b></td><td>${item.benchmark}</td><td class="secure">${statusText}</td></tr>`;
                    });
                }

                reportDiv.innerHTML = `
                    <p><b>Pipeline System Status:</b> <span class="secure">CONNECTED & SECURE</span></p>
                    <table>
                        <thead><tr><th>Detected Platform</th><th>Cost Benchmark</th><th>Status</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (err) {
                telemetryDiv.innerHTML = `<div class="log-entry danger">❌ Pipeline Error: ${err.message}</div>`;
                reportDiv.innerHTML = `<p style="color: #c5221f; font-weight: bold;">Pipeline stopped due to backend execution failure.</p>`;
            }
        }
    </script>
</body>

</html>
